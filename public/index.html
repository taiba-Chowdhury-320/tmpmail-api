<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TmpMail — Disposable Email</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    h1 { font-size: 2.2rem; color: #00ff88; letter-spacing: 3px; margin-bottom: 8px; }
    p.sub { color: #666; margin-bottom: 32px; font-size: 0.9rem; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 20px;
    }

    .email-box {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .email-addr {
      flex: 1;
      background: #0d0d0d;
      border: 1px solid #00ff88;
      border-radius: 8px;
      padding: 12px 16px;
      color: #00ff88;
      font-size: 1rem;
      font-family: monospace;
      min-width: 200px;
    }
    button {
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-weight: bold;
      cursor: pointer;
      font-family: monospace;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.8; }
    button.secondary {
      background: #1a1a1a;
      color: #00ff88;
      border: 1px solid #00ff88;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .inbox-title {
      font-size: 1rem;
      color: #888;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .msg-item {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .msg-item:hover { border-color: #00ff88; }
    .msg-from { color: #00ff88; font-size: 0.85rem; }
    .msg-subj { font-size: 1rem; margin-top: 4px; }
    .msg-time { color: #555; font-size: 0.78rem; margin-top: 4px; }

    .msg-body {
      background: #111;
      border: 1px solid #00ff88;
      border-radius: 8px;
      padding: 16px;
      margin-top: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
      line-height: 1.6;
      max-height: 400px;
      overflow-y: auto;
    }
    .empty { color: #444; text-align: center; padding: 40px; font-size: 0.9rem; }
    .loader { color: #00ff88; text-align: center; padding: 20px; }
    .badge {
      background: #00ff88;
      color: #000;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.75rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>⚡ TmpMail</h1>
<p class="sub">Instant disposable email — no signup needed</p>

<div class="card">
  <div class="email-box">
    <input class="email-addr" id="emailAddr" readonly placeholder="Click Generate..." />
    <button onclick="copyEmail()">Copy</button>
    <button class="secondary" onclick="generateEmail()" id="genBtn">Generate</button>
  </div>
</div>

<div class="card" id="inboxCard" style="display:none">
  <div class="inbox-title">
    <span>📬 Inbox <span class="badge" id="msgCount">0</span></span>
    <button class="secondary" onclick="refreshInbox()" style="padding:6px 14px;font-size:0.8rem">↻ Refresh</button>
  </div>
  <div id="msgList"></div>
</div>

<script>
  let token = null;
  let accountId = null;
  let autoRefresh = null;

  // API base — same origin on Vercel, or localhost for dev
  const API = "";

  async function generateEmail() {
    const btn = document.getElementById("genBtn");
    btn.disabled = true;
    btn.textContent = "Creating...";

    try {
      const res = await fetch(`${API}/api/create`, { method: "POST" });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      token = "Bearer " + data.token;
      accountId = data.id;

      document.getElementById("emailAddr").value = data.email;
      document.getElementById("inboxCard").style.display = "block";

      refreshInbox();
      if (autoRefresh) clearInterval(autoRefresh);
      autoRefresh = setInterval(refreshInbox, 10000); // 10s auto-refresh
    } catch (e) {
      alert("Error: " + e.message);
    }

    btn.disabled = false;
    btn.textContent = "New Email";
  }

  async function refreshInbox() {
    if (!token) return;
    const list = document.getElementById("msgList");
    list.innerHTML = `<div class="loader">Loading...</div>`;

    try {
      const res = await fetch(`${API}/api/messages`, {
        headers: { Authorization: token }
      });
      const msgs = await res.json();
      document.getElementById("msgCount").textContent = msgs.length;

      if (!msgs.length) {
        list.innerHTML = `<div class="empty">No messages yet. Waiting...</div>`;
        return;
      }

      list.innerHTML = msgs.map(m => `
        <div class="msg-item" onclick="openMsg('${m.id}')">
          <div class="msg-from">From: ${m.from?.address || "unknown"}</div>
          <div class="msg-subj">${m.subject || "(No Subject)"}</div>
          <div class="msg-time">${new Date(m.createdAt).toLocaleString()}</div>
        </div>
      `).join("");
    } catch (e) {
      list.innerHTML = `<div class="empty">Failed to load. Try again.</div>`;
    }
  }

  async function openMsg(id) {
    const list = document.getElementById("msgList");
    try {
      const res = await fetch(`${API}/api/messages/${id}`, {
        headers: { Authorization: token }
      });
      const msg = await res.json();

      const body = msg.text || msg.html?.replace(/<[^>]*>/g, "") || "(empty)";

      list.innerHTML += `
        <div class="msg-body">
          <strong>From:</strong> ${msg.from?.address}<br>
          <strong>Subject:</strong> ${msg.subject}<br>
          <strong>Date:</strong> ${new Date(msg.createdAt).toLocaleString()}<br><br>
          ${body}
        </div>
      `;
    } catch (e) {
      alert("Could not load message.");
    }
  }

  function copyEmail() {
    const val = document.getElementById("emailAddr").value;
    if (!val) return;
    navigator.clipboard.writeText(val);
    alert("Copied: " + val);
  }
</script>

</body>
</html>
